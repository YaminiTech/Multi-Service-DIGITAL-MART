<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - DigitalMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            padding: 40px 0;
            background: #f8fafc;
            min-height: calc(100vh - 200px);
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            align-items: start;
        }

        .checkout-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
            margin-bottom: 20px;
        }

        .checkout-card h3 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--dark);
        }

        .checkout-card h3 i {
            color: var(--primary);
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .payment-option {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .payment-option:hover {
            border-color: var(--primary);
            background: var(--primary-glow);
            transform: translateY(-2px);
        }

        .payment-option.selected {
            border-color: var(--primary);
            background: var(--primary-glow);
        }

        .payment-option.selected::after {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 20px;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .payment-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .payment-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .payment-info h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .payment-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .order-summary-sticky {
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .summary-row.total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group-full {
            grid-column: span 2;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-pay {
            width: 100%;
            margin-top: 25px;
            padding: 16px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        @media (max-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .order-summary-sticky {
                position: static;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="container nav-container">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo">DIGITAL<span>MART</span></div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><button id="themeToggle" class="theme-toggle-btn"><i class="fas fa-moon"></i></button></li>
            </ul>
        </div>
    </nav>

    <div class="checkout-container">
        <div class="container checkout-grid">
            <div class="checkout-main">
                <div class="checkout-card">
                    <h3><i class="fas fa-map-marker-alt"></i> Shipping Address</h3>
                    <form id="checkoutForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <input type="text" placeholder="First Name" required>
                            </div>
                            <div class="form-group">
                                <input type="text" placeholder="Last Name" required>
                            </div>
                            <div class="form-group-full">
                                <input type="text" placeholder="Address Block/House No." required>
                            </div>
                            <div class="form-group-full">
                                <input type="text" placeholder="Street Name / Locality" required>
                            </div>
                            <div class="form-group">
                                <input type="text" placeholder="City" required>
                            </div>
                            <div class="form-group">
                                <input type="text" placeholder="Pincode" required>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="checkout-card">
                    <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                    <div class="payment-methods">
                        <div class="payment-option" onclick="selectPayment(this, 'PhonePe')">
                            <div class="payment-icon" style="background: #6739b7;">
                                <i class="fas fa-mobile-alt" style="color: white;"></i>
                            </div>
                            <div class="payment-info">
                                <h4>PhonePe</h4>
                                <p>Pay using PhonePe UPI or Wallet</p>
                            </div>
                        </div>

                        <div class="payment-option" onclick="selectPayment(this, 'GPay')">
                            <div class="payment-icon">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Google_Pay_%28GPay%29_Logo.svg"
                                    alt="GPay">
                            </div>
                            <div class="payment-info">
                                <h4>Google Pay</h4>
                                <p>Fast and secure checkout with Google</p>
                            </div>
                        </div>

                        <div class="payment-option" onclick="selectPayment(this, 'Razorpay')">
                            <div class="payment-icon" style="background: #3395ff;">
                                <i class="fas fa-bolt" style="color: white;"></i>
                            </div>
                            <div class="payment-info">
                                <h4>Razorpay</h4>
                                <p>Cards, Netbanking, and UPI</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="order-summary-sticky">
                <div class="checkout-card">
                    <h3>Order Summary</h3>
                    <div id="checkoutSummary">
                        <!-- Summary injected here -->
                    </div>
                    <div class="summary-details">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">₹0</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span style="color: #22c55e;">FREE</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (GST)</span>
                            <span>₹0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="finalTotal">₹0</span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-pay" id="payBtn">COMPLETE ORDER</button>
                    <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 15px;">
                        <i class="fas fa-lock"></i> Secure 256-bit SSL Encrypted Payment
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedMethod = '';

        function selectPayment(el, method) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedMethod = method;
        }

        // --- Theme Management ---
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        const applyTheme = (theme) => {
            htmlElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (themeToggle) {
                const icon = themeToggle.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            }
        };

        const savedTheme = localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = htmlElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(newTheme);
            });
        }

        function loadCheckoutData() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) {
                const cart = JSON.parse(savedCart);
                const subtotal = cart.reduce((total, item) => total + item.price, 0);

                document.getElementById('subtotal').textContent = '₹' + subtotal;
                document.getElementById('finalTotal').textContent = '₹' + subtotal;

                const summaryList = document.getElementById('checkoutSummary');
                summaryList.innerHTML = '';
                cart.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'summary-row';
                    div.style.fontSize = '0.85rem';
                    div.innerHTML = `<span>${item.name}</span><span>₹${item.price}</span>`;
                    summaryList.appendChild(div);
                });
            }
        }

        document.getElementById('payBtn').addEventListener('click', () => {
            if (!selectedMethod) {
                alert('Please select a payment method');
                return;
            }
            alert('Processing ' + selectedMethod + ' Payment... Thank you for your order!');
            localStorage.removeItem('cart');
            window.location.href = 'index.html';
        });

        window.onload = loadCheckoutData;
    </script>
</body>

</html>
